name: Win Probability Charts

on:
  schedule:
    # Run Monday mornings during NFL season (Sept-Jan)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      year:
        description: 'NFL season year (e.g. 2025). Leave empty to auto-detect.'
        required: false
        default: ''
      week:
        description: 'NFL week number (1-22) or leave empty for full season'
        required: false
        default: ''
      team:
        description: 'Team abbreviation (optional, e.g. BAL). Leave empty for all teams.'
        required: false
        default: ''
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false
      force:
        description: 'Force regeneration even if release exists for current version'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  win-probability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.IRM_APP_ID }}
          private-key: ${{ secrets.IRM_APP_PRIVATE_KEY }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagick++-dev libcurl4-openssl-dev libuv1-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ runner.os }}-wp-${{ hashFiles('.github/workflows/win-probability.yml') }}
          restore-keys: |
            r-packages-${{ runner.os }}-wp-

      - name: Install dependencies
        run: |
          Rscript -e '
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages(c("nflfastR", "dplyr", "ggplot2", "glue", "scales", "ggimage", "lubridate", "ggrepel"))
          '

      - name: Cache nflreadr data
        uses: actions/cache@v4
        with:
          path: ~/.cache/nflreadr
          key: nflreadr-${{ runner.os }}-${{ github.event.inputs.year || 'auto' }}-${{ github.sha }}
          restore-keys: |
            nflreadr-${{ runner.os }}-${{ github.event.inputs.year || 'auto' }}-
            nflreadr-${{ runner.os }}-

      - name: Determine version and missing games
        id: meta
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(cat VERSION)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

          YEAR="${{ github.event.inputs.year }}"
          if [ -z "$YEAR" ]; then
            MONTH=$(date +%m)
            if [ "$MONTH" -lt 9 ]; then
              YEAR=$(( $(date +%Y) - 1 ))
            else
              YEAR=$(date +%Y)
            fi
          fi
          echo "year=$YEAR" >> "$GITHUB_OUTPUT"

          export WP_YEAR="$YEAR"
          export WP_WEEK="${{ github.event.inputs.week }}"
          export WP_TEAM="${{ github.event.inputs.team }}"
          GAME_IDS=$(Rscript -e '
          options(nflreadr.cache = "filesystem")
          library(nflfastR)
          library(dplyr)
          year <- as.integer(Sys.getenv("WP_YEAR"))
          week_input <- Sys.getenv("WP_WEEK")
          team_input <- Sys.getenv("WP_TEAM")
          pbp <- load_pbp(year)
          game_ids <- unique(pbp$game_id)
          if (nzchar(week_input)) {
            week_games <- pbp |> filter(week == as.integer(week_input)) |> pull(game_id) |> unique()
            game_ids <- game_ids[game_ids %in% week_games]
          }
          if (nzchar(team_input)) {
            team_games <- pbp |> filter(home_team == team_input | away_team == team_input) |> pull(game_id) |> unique()
            game_ids <- game_ids[game_ids %in% team_games]
          }
          cat(paste(game_ids, collapse = " "))
          ' 2>/dev/null)

          MISSING=""
          FORCE="${{ github.event.inputs.force }}"
          for gid in $GAME_IDS; do
            if [ "$FORCE" = "true" ]; then
              MISSING="$MISSING $gid"
              continue
            fi

            EXISTING_TAG=$(gh release list --search "${YEAR}-wp-${gid}-v" --json tagName -q '.[0].tagName' 2>/dev/null || true)
            if [ -z "$EXISTING_TAG" ]; then
              MISSING="$MISSING $gid"
              continue
            fi

            EXISTING_MAJOR=$(echo "$EXISTING_TAG" | grep -oP 'v\K[0-9]+' || echo "0")
            if [ "$EXISTING_MAJOR" != "$MAJOR" ]; then
              MISSING="$MISSING $gid"
            fi
          done

          echo "game_ids=$GAME_IDS" >> "$GITHUB_OUTPUT"
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"

      - name: Generate missing charts
        if: steps.meta.outputs.missing != ''
        run: |
          ARGS="${{ steps.meta.outputs.year }}"
          if [ -n "${{ github.event.inputs.week }}" ]; then
            ARGS="$ARGS --week ${{ github.event.inputs.week }}"
          fi
          if [ -n "${{ github.event.inputs.team }}" ]; then
            ARGS="$ARGS --team ${{ github.event.inputs.team }}"
          fi
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          GAME_ARGS="--games $(echo '${{ steps.meta.outputs.missing }}' | tr ' ' ',' | sed 's/^,//;s/,$//')"
          Rscript scripts/win-probability.R $ARGS $GAME_ARGS

      - name: Create releases
        if: steps.meta.outputs.missing != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          YEAR="${{ steps.meta.outputs.year }}"
          for gid in ${{ steps.meta.outputs.missing }}; do
            WP_PNG="data/${YEAR}/wp-${gid}-v${VERSION}.png"
            if [ ! -f "$WP_PNG" ]; then
              echo "Warning: $WP_PNG not found, skipping release"
              continue
            fi

            PIECES=($(echo "$gid" | tr '_' ' '))
            AWAY="${PIECES[2]}"
            HOME="${PIECES[3]}"
            WEEK_NUM="${PIECES[1]}"

            if [ "$WEEK_NUM" -eq 19 ]; then
              WEEK_LABEL="Wild Card Round"
            elif [ "$WEEK_NUM" -eq 20 ]; then
              WEEK_LABEL="Divisional Round"
            elif [ "$WEEK_NUM" -eq 21 ]; then
              WEEK_LABEL="Conference Championship"
            elif [ "$WEEK_NUM" -eq 22 ]; then
              WEEK_LABEL="Super Bowl"
            else
              WEEK_LABEL="Week ${WEEK_NUM}"
            fi

            RELEASE_TAG="${YEAR}-wp-${gid}-v${VERSION}"
            gh release delete "$RELEASE_TAG" --yes 2>/dev/null || true

            SYNOPSIS=$(Rscript -e '
            options(nflreadr.cache = "filesystem")
            source("scripts/helpers.R")
            source("scripts/wp-functions.R")
            library(nflfastR)
            library(dplyr)
            year <- as.integer("${YEAR}")
            game_id <- "${gid}"
            pbp <- load_pbp(year) |> filter(game_id == !!game_id)
            cat(generate_synopsis(pbp))
            ' 2>/dev/null || echo "")

            ASSETS=("$WP_PNG")
            RB_PNG=$(find charts -name "rb-workload-w*-${gid}-v${VERSION}.png" 2>/dev/null || true)
            if [ -n "$RB_PNG" ]; then
              ASSETS+=("$RB_PNG")
            fi
            WRTE_PNG=$(find charts -name "wrte-targets-w*-${gid}-v${VERSION}.png" 2>/dev/null || true)
            if [ -n "$WRTE_PNG" ]; then
              ASSETS+=("$WRTE_PNG")
            fi

            gh release create "$RELEASE_TAG" "${ASSETS[@]}" \
              --title "${YEAR} ${WEEK_LABEL}: ${AWAY} at ${HOME} (v${VERSION})" \
              --notes "${SYNOPSIS}"
            echo "Created release $RELEASE_TAG with group of images: ${ASSETS[*]}"
          done

      - name: Skip notification
        if: steps.meta.outputs.missing == ''
        run: echo "All charts already released for current version, nothing to do."
