name: Win Probability Charts

on:
  schedule:
    # Run Monday mornings during NFL season (Sept-Jan)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      year:
        description: 'NFL season year (e.g. 2025). Leave empty to auto-detect.'
        required: false
        default: ''
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false

jobs:
  win-probability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'
          use-public-rspm: true

      - name: Install system dependencies
        run: sudo apt-get install -y libmagick++-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ runner.os }}-${{ hashFiles('.github/workflows/win-probability.yml') }}
          restore-keys: |
            r-packages-${{ runner.os }}-

      - name: Install dependencies
        run: |
          Rscript -e '
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages(c("nflfastR", "dplyr", "ggplot2", "glue", "scales", "ggimage", "lubridate"))
          '

      - name: Cache nflreadr data
        uses: actions/cache@v4
        with:
          path: ~/.cache/nflreadr
          key: nflreadr-${{ runner.os }}-${{ github.event.inputs.year || 'auto' }}-${{ github.sha }}
          restore-keys: |
            nflreadr-${{ runner.os }}-${{ github.event.inputs.year || 'auto' }}-
            nflreadr-${{ runner.os }}-

      - name: Generate win probability charts
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="${{ github.event.inputs.year }}"
          fi
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          Rscript scripts/win-probability.R $ARGS

      - name: Upload charts
        uses: actions/upload-artifact@v4
        with:
          name: win-probability-charts
          path: data/**/*.png
