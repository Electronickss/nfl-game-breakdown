name: Win Probability Charts

on:
  schedule:
    # Run Monday mornings during NFL season (Sept-Jan)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      year:
        description: 'NFL season year (e.g. 2025). Leave empty to auto-detect.'
        required: false
        default: ''
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false
      force:
        description: 'Force regeneration even if release exists for current version'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  win-probability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.IRM_APP_ID }}
          private-key: ${{ secrets.IRM_APP_PRIVATE_KEY }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagick++-dev libcurl4-openssl-dev libuv1-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ runner.os }}-wp-${{ hashFiles('.github/workflows/win-probability.yml') }}
          restore-keys: |
            r-packages-${{ runner.os }}-wp-

      - name: Install dependencies
        run: |
          Rscript -e '
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages(c("nflfastR", "dplyr", "ggplot2", "glue", "scales", "ggimage", "lubridate", "ggrepel"))
          '

      - name: Cache nflreadr data
        uses: actions/cache@v4
        with:
          path: ~/.cache/nflreadr
          key: nflreadr-${{ runner.os }}-${{ github.event.inputs.year || 'auto' }}-${{ github.sha }}
          restore-keys: |
            nflreadr-${{ runner.os }}-${{ github.event.inputs.year || 'auto' }}-
            nflreadr-${{ runner.os }}-

      - name: Determine version and missing games
        id: meta
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(cat VERSION)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

          YEAR="${{ github.event.inputs.year }}"
          if [ -z "$YEAR" ]; then
            MONTH=$(date +%m)
            if [ "$MONTH" -lt 9 ]; then
              YEAR=$(( $(date +%Y) - 1 ))
            else
              YEAR=$(date +%Y)
            fi
          fi
          echo "year=$YEAR" >> "$GITHUB_OUTPUT"

          export WP_YEAR="$YEAR"
          GAME_IDS=$(Rscript -e '
          options(nflreadr.cache = "filesystem")
          library(nflfastR)
          library(dplyr)
          year <- as.integer(Sys.getenv("WP_YEAR"))
          pbp <- load_pbp(year)
          game_ids <- unique(pbp$game_id)
          cat(paste(game_ids, collapse = " "))
          ' 2>/dev/null)

          RELEASE_TAG="wp-${YEAR}-v${VERSION}"
          EXISTING_ASSETS=$(gh release view "$RELEASE_TAG" --json assets -q '.assets[].name' 2>/dev/null || true)

          MISSING=""
          FORCE="${{ github.event.inputs.force }}"
          for gid in $GAME_IDS; do
            if [ "$FORCE" = "true" ]; then
              MISSING="$MISSING $gid"
              continue
            fi

            # Check if wp chart asset exists in release
            if ! echo "$EXISTING_ASSETS" | grep -q "wp-${gid}-v${VERSION}.png"; then
              MISSING="$MISSING $gid"
            fi
          done

          echo "game_ids=$GAME_IDS" >> "$GITHUB_OUTPUT"
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"

      - name: Generate missing charts
        if: steps.meta.outputs.missing != ''
        run: |
          ARGS="${{ steps.meta.outputs.year }}"
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          GAME_ARGS="--games $(echo '${{ steps.meta.outputs.missing }}' | tr ' ' ',' | sed 's/^,//;s/,$//')"
          Rscript scripts/win-probability.R $ARGS $GAME_ARGS

      - name: Create or update release
        if: steps.meta.outputs.missing != '' || always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          YEAR="${{ steps.meta.outputs.year }}"
          RELEASE_TAG="wp-${YEAR}-v${VERSION}"

          # Ensure release exists
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --title "NFL Season ${YEAR} Game Breakdowns (v${VERSION})" --notes "Win probability, RB workload, and WR/TE target charts for NFL season ${YEAR}."

          # Upload all generated pngs from data/${YEAR} and charts
          PNG_FILES=$(find data/${YEAR} charts -name "*.png" 2>/dev/null || true)
          if [ -n "$PNG_FILES" ]; then
            gh release upload "$RELEASE_TAG" data/${YEAR}/*.png charts/*.png --clobber 2>/dev/null || true
            echo "Uploaded all charts to release $RELEASE_TAG"
          fi

      - name: Skip notification
        if: steps.meta.outputs.missing == ''
        run: echo "All charts already released for current version, nothing to do."
