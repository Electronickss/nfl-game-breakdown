name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libuv1-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ runner.os }}-test-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: |
            r-packages-${{ runner.os }}-test-

      - name: Install dependencies
        run: |
          Rscript -e '
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages(c("testthat", "covr", "dplyr", "ggplot2", "glue", "scales", "ggrepel"))
          '

      - name: Run tests
        run: Rscript -e 'testthat::test_dir("tests/testthat", reporter = "summary")'

      - name: Check coverage
        run: |
          Rscript -e '
          library(testthat)
          library(covr)
          cov <- file_coverage(
            source_files = c("scripts/wp-functions.R", "scripts/fs-functions.R"),
            test_files = c("tests/testthat/setup.R", "tests/testthat/test-win-probability.R", "tests/testthat/test-fantasy-stats.R")
          )
          pct <- percent_coverage(cov)
          cat(sprintf("Total coverage: %.1f%%\n", pct))
          if (pct < 95) {
            cat("ERROR: Coverage below 95% threshold\n")
            quit(status = 1)
          }
          '
