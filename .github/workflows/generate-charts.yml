name: Generate Game Charts

on:
  schedule:
    # Run Monday mornings during NFL season (Sept-Jan)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      year:
        description: 'NFL season year'
        required: true
        default: '2024'
      week:
        description: 'NFL week number'
        required: true
        default: '1'
      team:
        description: 'Team abbreviation (optional, for team-specific charts)'
        required: false
        default: ''

jobs:
  generate-charts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'

      - name: Install system dependencies
        run: sudo apt-get install -y libmagick++-dev

      - name: Install dependencies
        run: |
          Rscript -e '
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages(c("nflfastR", "tidyverse", "scales", "ggimage", "lubridate"))
         '

      - name: Generate win probability charts
        run: Rscript scripts/win-probability.R

      - name: Generate fantasy stats for all games
        run: |
          Rscript -e "
          source('scripts/fantasy-stats.R')
          year <- as.integer('${{ github.event.inputs.year }}')
          week <- as.integer('${{ github.event.inputs.week }}')
          team <- '${{ github.event.inputs.team }}'

          pbp <- load_pbp_data(year)
          schedule <- load_schedule(year) %>% filter(week == !!week)

          # Generate RB workload and WR/TE targets charts (both teams)
          rb_plot <- plot_rb_workload(pbp, week, year)
          ggsave(str_interp('charts/rb-workload-w\${week}.png'), rb_plot, width = 10, height = 6, dpi = 150)

          wrte_plot <- plot_wrte_targets(pbp, week, year)
          ggsave(str_interp('charts/wrte-targets-w\${week}.png'), wrte_plot, width = 10, height = 6, dpi = 150)

          # Generate team-specific charts
          if (nchar(team) > 0) {
            teams <- team
          } else {
            teams <- unique(c(schedule\$home_team, schedule\$away_team))
          }

          for (t in teams) {
            cat(str_interp('Processing \${t}...\n'))
            tryCatch({
              team_stats <- get_team_stats(pbp, t, week)
              summary_plot <- plot_team_summary(team_stats, t, week, year)
              ggsave(str_interp('charts/\${t}-w\${week}-summary.png'), summary_plot, width = 8, height = 6, dpi = 150)

              if (nrow(team_stats\$receiving) > 0) {
                target_plot <- plot_target_share(team_stats\$receiving, t)
                ggsave(str_interp('charts/\${t}-w\${week}-targets.png'), target_plot, width = 8, height = 6, dpi = 150)

                air_plot <- plot_air_yards(team_stats\$receiving, t)
                ggsave(str_interp('charts/\${t}-w\${week}-airyards.png'), air_plot, width = 8, height = 6, dpi = 150)
              }
            }, error = function(e) {
              cat(str_interp('Error processing \${t}: \${e\$message}\n'))
            })
          }
          "

      - name: Upload charts
        uses: actions/upload-artifact@v4
        with:
          name: game-charts-${{ github.event.inputs.year }}-w${{ github.event.inputs.week }}
          path: charts/*.png
