name: Fantasy Stats Charts

on:
  schedule:
    # Run Monday mornings during NFL season (Sept-Jan)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      year:
        description: 'NFL season year (e.g. 2025)'
        required: true
        default: '2025'
      week:
        description: 'NFL week number (1-18)'
        required: true
        default: '1'
      team:
        description: 'Team abbreviation (optional, e.g. BAL). Leave empty for all teams.'
        required: false
        default: ''
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false
      force:
        description: 'Force regeneration even if release exists for current version'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fantasy-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.IRM_APP_ID }}
          private-key: ${{ secrets.IRM_APP_PRIVATE_KEY }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagick++-dev libcurl4-openssl-dev libuv1-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ runner.os }}-fs-${{ hashFiles('.github/workflows/fantasy-stats.yml') }}
          restore-keys: |
            r-packages-${{ runner.os }}-fs-

      - name: Install dependencies
        run: |
          Rscript -e '
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages(c("nflfastR", "dplyr", "ggplot2", "glue", "scales", "future", "future.apply", "ggrepel"))
          '

      - name: Cache nflreadr data
        uses: actions/cache@v4
        with:
          path: ~/.cache/nflreadr
          key: nflreadr-${{ runner.os }}-${{ github.event.inputs.year || '2025' }}-${{ github.sha }}
          restore-keys: |
            nflreadr-${{ runner.os }}-${{ github.event.inputs.year || '2025' }}-
            nflreadr-${{ runner.os }}-

      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(cat VERSION)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          YEAR="${{ github.event.inputs.year }}"
          WEEK="${{ github.event.inputs.week }}"
          RELEASE_TAG="fantasy-${YEAR}-w${WEEK}-v${VERSION}"

          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "force=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXISTING_TAG=$(gh release list --search "${YEAR}-fantasy-w${WEEK}-v" --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$EXISTING_TAG" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            EXISTING_MAJOR=$(echo "$EXISTING_TAG" | grep -oP 'v\K[0-9]+' || echo "0")
            if [ "$EXISTING_MAJOR" = "$MAJOR" ]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "exists=false" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "force=false" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Generate fantasy stats charts
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          ARGS="${{ github.event.inputs.year }} ${{ github.event.inputs.week }} ${{ github.event.inputs.team }}"
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          if [ "${{ steps.check.outputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          Rscript scripts/fantasy-stats.R $ARGS

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          YEAR="${{ github.event.inputs.year }}"
          WEEK="${{ github.event.inputs.week }}"
          RELEASE_TAG="${YEAR}-fantasy-w${WEEK}-v${VERSION}"

          gh release delete "$RELEASE_TAG" --yes 2>/dev/null || true
          gh release create "$RELEASE_TAG" charts/*.png \
            --title "${YEAR} Fantasy Stats: Week ${WEEK} (v${VERSION})" \
            --notes "Fantasy stat breakdowns for Week ${WEEK}, ${YEAR} NFL games including passing, rushing, receiving, target share, and air yards charts."
          echo "Created release $RELEASE_TAG"

      - name: Skip notification
        if: steps.check.outputs.exists == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          echo "Release for v${VERSION} already exists, nothing to do."
