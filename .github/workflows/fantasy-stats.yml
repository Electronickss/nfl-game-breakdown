name: Fantasy Stats Charts

on:
  schedule:
    # Run Monday mornings during NFL season (Sept-Jan)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      year:
        description: 'NFL season year (e.g. 2025)'
        required: true
        default: '2025'
      week:
        description: 'NFL week number (1-18)'
        required: true
        default: '1'
      team:
        description: 'Team abbreviation (optional, e.g. BAL). Leave empty for all teams.'
        required: false
        default: ''
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false

jobs:
  fantasy-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'
          use-public-rspm: true

      - name: Install system dependencies
        run: sudo apt-get install -y libmagick++-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ runner.os }}-${{ hashFiles('.github/workflows/fantasy-stats.yml') }}
          restore-keys: |
            r-packages-${{ runner.os }}-

      - name: Install dependencies
        run: |
          Rscript -e '
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages(c("nflfastR", "tidyverse", "scales", "ggimage", "lubridate", "future", "future.apply"))
          '

      - name: Cache nflreadr data
        uses: actions/cache@v4
        with:
          path: ~/.cache/nflreadr
          key: nflreadr-${{ runner.os }}-${{ github.event.inputs.year || '2025' }}-${{ github.sha }}
          restore-keys: |
            nflreadr-${{ runner.os }}-${{ github.event.inputs.year || '2025' }}-
            nflreadr-${{ runner.os }}-

      - name: Determine season and week
        id: meta
        run: |
          YEAR="${{ github.event.inputs.year || '2025' }}"
          WEEK="${{ github.event.inputs.week || '1' }}"
          TEAM="${{ github.event.inputs.team || '' }}"
          VERBOSE="${{ github.event.inputs.verbose || 'false' }}"
          echo "year=$YEAR" >> "$GITHUB_OUTPUT"
          echo "week=$WEEK" >> "$GITHUB_OUTPUT"
          echo "team=$TEAM" >> "$GITHUB_OUTPUT"
          echo "verbose=$VERBOSE" >> "$GITHUB_OUTPUT"

      - name: Generate fantasy stats charts
        run: |
          ARGS="${{ steps.meta.outputs.year }} ${{ steps.meta.outputs.week }} ${{ steps.meta.outputs.team }}"
          if [ "${{ steps.meta.outputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          Rscript scripts/fantasy-stats.R $ARGS

      - name: Upload charts
        uses: actions/upload-artifact@v4
        with:
          name: fantasy-stats-${{ steps.meta.outputs.year }}-w${{ steps.meta.outputs.week }}
          path: charts/*.png
