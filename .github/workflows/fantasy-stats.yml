name: Fantasy Stats Charts

on:
  schedule:
    # Run Monday mornings during NFL season (Sept-Jan)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      year:
        description: 'NFL season year (e.g. 2025)'
        required: true
        default: '2025'
      week:
        description: 'NFL week number (1-18)'
        required: true
        default: '1'
      team:
        description: 'Team abbreviation (optional, e.g. BAL). Leave empty for all teams.'
        required: false
        default: ''

jobs:
  fantasy-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'

      - name: Install system dependencies
        run: sudo apt-get install -y libmagick++-dev

      - name: Install dependencies
        run: |
          Rscript -e '
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages(c("nflfastR", "tidyverse", "scales", "ggimage", "lubridate"))
         '

      - name: Determine season and week
        id: meta
        run: |
          # TODO: auto-detect week once NFL 2026 season schedule is available.
          # Week 1 2026 starts ~Sep 8 2026. Until then, default to 2025.
          YEAR="${{ github.event.inputs.year || '2025' }}"
          WEEK="${{ github.event.inputs.week || '1' }}"
          TEAM="${{ github.event.inputs.team || '' }}"
          echo "year=$YEAR" >> "$GITHUB_OUTPUT"
          echo "week=$WEEK" >> "$GITHUB_OUTPUT"
          echo "team=$TEAM" >> "$GITHUB_OUTPUT"

      - name: Generate fantasy stats charts
        run: Rscript scripts/fantasy-stats.R "${{ steps.meta.outputs.year }}" "${{ steps.meta.outputs.week }}" "${{ steps.meta.outputs.team }}"

      - name: Upload charts
        uses: actions/upload-artifact@v4
        with:
          name: fantasy-stats-${{ steps.meta.outputs.year }}-w${{ steps.meta.outputs.week }}
          path: charts/*.png
